# Deploy Next.js app in /aurora to GitHub Pages (static export). Enable Pages: Settings → Pages → Source: GitHub Actions.
name: Deploy aurora to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: aurora/package-lock.json

      - name: Compute base path for GitHub Pages
        id: base
        shell: bash
        run: |
          name="${{ github.event.repository.name }}"
          if [[ "$name" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "Using root path (user/org site repo)."
          else
            echo "path=/$name" >> "$GITHUB_OUTPUT"
            echo "Using project path /$name"
          fi

      - name: Install and static export
        working-directory: aurora
        env:
          NEXT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: aurora/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
